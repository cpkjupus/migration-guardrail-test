name: Migration Guardrail

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  migration-check:
    name: migration-guardrail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for migration file changes
        id: check-migrations
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...${{ github.event.pull_request.head.sha }})
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q '/migrations/'; then
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Migration files detected in this PR."
          else
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No migration files changed. Skipping up-to-date check."
          fi

      - name: Verify branch is up-to-date with main
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: |
          echo "Checking if origin/main is an ancestor of this branch..."
          if git merge-base --is-ancestor origin/main ${{ github.event.pull_request.head.sha }}; then
            echo "::notice::Branch is up-to-date with main. Migration guardrail passed."
          else
            echo "::error::Branch is NOT up-to-date with main. Since this PR modifies migration files, you must rebase or merge main into your branch before merging."
            echo ""
            echo "This prevents conflicting migration sequences. Please run:"
            echo "  git fetch origin main"
            echo "  git rebase origin/main"
            echo "Then force-push your branch."
            exit 1
          fi
