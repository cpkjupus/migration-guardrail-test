name: Retrigger Migration Guardrail

on:
  push:
    branches: [main]
    paths:
      - "**/migrations/**"

jobs:
  retrigger:
    name: retrigger-migration-checks
    runs-on: ubuntu-latest
    steps:
      - name: Re-run migration guardrail on open migration PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get all open PRs targeting main
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base: "main",
            });

            core.info(`Found ${pulls.length} open PRs targeting main`);

            for (const pr of pulls) {
              // Get files changed in this PR
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
              });

              const hasMigrations = files.some((f) =>
                f.filename.includes("/migrations/")
              );

              if (!hasMigrations) {
                core.info(`PR #${pr.number}: no migrations, skipping`);
                continue;
              }

              core.info(`PR #${pr.number}: has migrations, retriggering check`);

              // Find the latest check suite for this PR's head SHA
              const checkSuites = await github.rest.checks.listSuitesForRef({
                owner,
                repo,
                ref: pr.head.sha,
              });

              for (const suite of checkSuites.data.check_suites) {
                // Only rerequest GitHub Actions suites
                if (suite.app.slug === "github-actions") {
                  try {
                    await github.rest.checks.rerequestSuite({
                      owner,
                      repo,
                      check_suite_id: suite.id,
                    });
                    core.info(`  Re-requested check suite ${suite.id} for PR #${pr.number}`);
                  } catch (err) {
                    core.warning(`  Failed to re-request suite ${suite.id}: ${err.message}`);
                  }
                }
              }
            }
